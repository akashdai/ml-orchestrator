project:
  name: "ML Experiment Orchestrator"
  version: "1.0.0"

preprocessing:
  missing_threshold: 0.5
  outlier_method: "iqr"
  handle_imbalance: true

feature_selection:
  enabled: true
  max_features: 20

supervised:
  cv_folds: 3
  tuning:
    n_trials: 15
    timeout: 120

unsupervised:
  dimensionality_reduction:
    - PCA
    - TSNE
  clustering:
    - KMeans
    - DBSCAN
    - AgglomerativeClustering
    - GaussianMixture
  n_clusters_range: [2, 8]

mlflow:
  tracking_uri: "./experiments/mlruns"
  experiment_name: "ML_Orchestrator"